name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci --prefix server
      - name: Lint
        run: npm run lint --prefix server --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci --prefix server
      - name: Run tests
        run: npm test --prefix server

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci --prefix server
      - name: Install client dependencies
        run: npm ci --prefix client
      - name: Build client
        run: npm run build --prefix client
      - name: Start server
        run: npm start --prefix server &
        env:
          PORT: 5000
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/peerconnect_test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 7d
          CLIENT_URL: http://localhost:5173
      - name: Wait for server
        run: sleep 3
      - name: Health check
        run: |
          curl --fail --silent http://localhost:5000/health | grep '"status":"ok"'
