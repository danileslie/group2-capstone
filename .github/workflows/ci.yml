# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Node version
        id: node-ver
        run: echo "version=$(cat .nvmrc 2>/dev/null || echo '20')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-ver.outputs.version }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - run: npm ci --prefix server
      - run: npm ci --prefix client

      - run: npm --prefix server run lint --if-present
      - run: npm --prefix client run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Node version
        id: node-ver
        run: echo "version=$(cat .nvmrc 2>/dev/null || echo '20')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-ver.outputs.version }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - run: npm ci --prefix server
      - run: npm ci --prefix client

      - run: npm --prefix server run test --if-present
      - run: npm --prefix client run test --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Node version
        id: node-ver
        run: echo "version=$(cat .nvmrc 2>/dev/null || echo '20')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-ver.outputs.version }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci --prefix client
      - run: npm --prefix client run build

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build
    env:
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      MONGO_URI: mongodb://localhost:27017/peerconnect_ci
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Node version
        id: node-ver
        run: echo "version=$(cat .nvmrc 2>/dev/null || echo '20')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-ver.outputs.version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci --prefix server

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '7.0'

      - name: Start server
        run: node server/src/app.js &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health && echo "Server ready" && exit 0
            echo "Attempt $i failed, retrying..."
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Assert /health returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "Expected 200, got $STATUS"; exit 1; }
